name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-dev pkg-config zstd

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libarchive zstd pkgconf
          echo "PKG_CONFIG_PATH=$(brew --prefix libarchive)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build -j

      - name: Test (Linux Debug with ASan leak detection)
        if: runner.os == 'Linux' && matrix.build_type == 'Debug'
        env:
          ASAN_OPTIONS: detect_leaks=1
        run: ctest --test-dir build --output-on-failure

      - name: Test
        if: ${{ ! (runner.os == 'Linux' && matrix.build_type == 'Debug') }}
        run: ctest --test-dir build --output-on-failure
